<style>
        .biometric-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .biometric-scan {
            animation: scan-line 3s linear infinite;
        }
        @keyframes scan-line {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .glass-panel {
            background: rgba(17, 34, 64, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(95, 251, 214, 0.3);

<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary tracking-tight">VaultPass</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Vault Locked</p>
</header>
<!-- Login Card / Form -->
<div class="w-full glass-panel rounded-[24px] p-lg shadow-2xl flex flex-col items-center relative overflow-hidden">
<!-- Biometric Visualizer -->
<div class="relative w-32 h-32 flex items-center justify-center mb-lg group cursor-pointer" id="biometric-trigger">
<!-- Pulse rings -->
<div class="absolute inset-0 rounded-full border-2 border-primary-container biometric-pulse"></div>
<div class="absolute inset-0 rounded-full border border-primary-container biometric-pulse" style="animation-delay: 0.5s;"></div>
<!-- Inner circle -->
<div class="relative w-24 h-24 rounded-full bg-surface-container-highest border border-white/10 flex items-center justify-center shadow-inner overflow-hidden z-10 transition-colors duration-300 group-hover:bg-surface-bright">
<span class="material-symbols-outlined text-primary-container text-5xl" style="font-variation-settings: 'FILL' 1;">
                        fingerprint
                    </span>
<!-- Scan line effect -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary-container shadow-[0_0_8px_#5ffbd6] biometric-scan"></div>
</div>
</div>
<!-- Form Fields -->
<form class="w-full flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Master Password Input -->
<div class="relative w-full input-glow transition-shadow duration-200 rounded-lg bg-[#16274B] border-b-2 border-transparent focus-within:border-primary-container overflow-hidden">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl">lock</span>
</div>
<input class="w-full bg-transparent border-none text-on-surface font-code-display text-code-display py-md pl-[44px] pr-[44px] focus:ring-0 placeholder:text-on-surface-variant/50 placeholder:font-body-md" id="master-password" placeholder="Master Password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
<!-- Primary Action -->
<button class="w-full py-md px-lg bg-primary-container text-on-primary-fixed font-title-lg text-title-lg rounded-xl shadow-[0_4px_14px_rgba(95,251,214,0.2)] hover:bg-primary-fixed-dim hover:shadow-[0_6px_20px_rgba(95,251,214,0.3)] transition-all duration-200 active:scale-[0.98] flex justify-center items-center gap-sm mt-sm" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">lock_open</span>
                    Unlock
                </button>
</form>
<!-- Forgot Password Link -->
<div class="mt-lg w-full text-center">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary-container transition-colors inline-flex items-center gap-xs" href="#">
<span class="material-symbols-outlined text-[16px]">help</span>
                    Forgot Master Password?
                </a>
</div>
</div>
<!-- Footer Indicator -->
<div class="mt-xl flex items-center gap-xs text-on-surface-variant/50 font-label-md text-label-md">
<span class="material-symbols-outlined text-[14px]">shield</span>
            End-to-End Encrypted
        </div>
</main>
<script>
        // Simple interaction script to demonstrate biometric click
        document.getElementById('biometric-trigger').addEventListener('click', function() {
            const icon = this.querySelector('.material-symbols-outlined');
            icon.style.color = '#ffffff';
            setTimeout(() => {
                icon.style.color = '';
            }, 300);
        });
    </script>
