<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VaultPass - Add/Edit Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#ffffff",
                        "surface-container-high": "#1f2942",
                        "surface": "#08132a",
                        "on-primary-fixed": "#002019",
                        "surface-bright": "#2f3952",
                        "surface-container-highest": "#2a344d",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#101b33",
                        "secondary-container": "#3c4962",
                        "on-surface-variant": "#bacac3",
                        "tertiary-container": "#d8e2ff",
                        "on-error": "#690005",
                        "on-secondary-container": "#abb9d6",
                        "outline": "#85948e",
                        "on-background": "#d9e2ff",
                        "on-tertiary-fixed": "#091b39",
                        "secondary-fixed-dim": "#b9c7e4",
                        "inverse-surface": "#d9e2ff",
                        "on-secondary": "#233148",
                        "inverse-on-surface": "#263049",
                        "background": "#08132a",
                        "on-tertiary": "#20304f",
                        "on-primary-fixed-variant": "#005142",
                        "on-primary": "#00382d",
                        "on-tertiary-fixed-variant": "#374767",
                        "tertiary-fixed-dim": "#b6c6ed",
                        "primary-fixed-dim": "#38debb",
                        "on-primary-container": "#00725e",
                        "surface-container": "#151f37",
                        "surface-tint": "#38debb",
                        "inverse-primary": "#006b58",
                        "secondary-fixed": "#d6e3ff",
                        "surface-variant": "#2a344d",
                        "primary-fixed": "#5ffbd6",
                        "secondary": "#b9c7e4",
                        "surface-container-lowest": "#030d25",
                        "on-tertiary-container": "#556486",
                        "on-secondary-fixed": "#0d1c32",
                        "outline-variant": "#3c4a45",
                        "on-secondary-fixed-variant": "#39475f",
                        "primary-container": "#5ffbd6",
                        "error": "#ffb4ab",
                        "primary": "#ffffff",
                        "tertiary-fixed": "#d8e2ff",
                        "error-container": "#93000a",
                        "surface-dim": "#08132a",
                        "on-surface": "#d9e2ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "container-padding": "20px",
                        "xs": "4px",
                        "sm": "12px",
                        "lg": "24px",
                        "md": "16px",
                        "base": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "code-display": ["JetBrains Mono"],
                        "headline-lg-mobile": ["Inter"],
                        "title-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-md": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "600" }],
                        "code-display": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }],
                        "title-lg": ["22px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "display-lg": ["57px", { "lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen pb-safe">
<!-- TopAppBar (Transactional - Hidden default nav, custom for Edit) -->
<header class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-xl border-b border-white/10 shadow-sm flex justify-between items-center px-container-padding h-16 transition-colors duration-200">
<button class="text-on-surface-variant hover:bg-surface-bright/50 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed md:hidden">Edit Entry</h1>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed hidden md:block">Edit Entry</h1>
<button class="text-primary hover:bg-surface-bright/50 p-2 rounded-full transition-colors flex items-center justify-center font-title-lg text-title-lg">
<span class="material-symbols-outlined mr-1" data-icon="check">check</span>
<span class="hidden md:inline ml-1">Save</span>
</button>
</header>
<!-- Main Canvas -->
<main class="pt-24 px-container-padding pb-32 max-w-3xl mx-auto space-y-lg">
<!-- Category Selector -->
<section class="flex space-x-sm overflow-x-auto pb-2 scrollbar-hide">
<button class="flex items-center px-4 py-2 bg-secondary-container text-on-secondary-container rounded-full font-label-md text-label-md whitespace-nowrap">
<span class="material-symbols-outlined text-[18px] mr-2" data-icon="login">login</span>
                Login
            </button>
<button class="flex items-center px-4 py-2 bg-surface-container text-on-surface-variant border border-outline-variant rounded-full font-label-md text-label-md whitespace-nowrap hover:bg-surface-bright/50 transition-colors">
<span class="material-symbols-outlined text-[18px] mr-2" data-icon="credit_card">credit_card</span>
                Card
            </button>
<button class="flex items-center px-4 py-2 bg-surface-container text-on-surface-variant border border-outline-variant rounded-full font-label-md text-label-md whitespace-nowrap hover:bg-surface-bright/50 transition-colors">
<span class="material-symbols-outlined text-[18px] mr-2" data-icon="notes">notes</span>
                Secure Note
            </button>
</section>
<!-- Core Details Card -->
<div class="bg-[#112240] rounded-xl border border-white/10 p-md space-y-md">
<!-- Title Input -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Title</label>
<div class="flex items-center bg-[#16274B] rounded-lg border-b-2 border-transparent focus-within:border-primary transition-colors">
<span class="material-symbols-outlined text-on-surface-variant p-3" data-icon="title">title</span>
<input class="w-full bg-transparent border-none text-on-surface font-body-lg text-body-lg focus:ring-0 p-3 pl-0" placeholder="e.g. My Bank" type="text" value="Github Primary"/>
</div>
</div>
<!-- Website Input -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Website (URI)</label>
<div class="flex items-center bg-[#16274B] rounded-lg border-b-2 border-transparent focus-within:border-primary transition-colors">
<span class="material-symbols-outlined text-on-surface-variant p-3" data-icon="language">language</span>
<input class="w-full bg-transparent border-none text-on-surface font-body-lg text-body-lg focus:ring-0 p-3 pl-0" placeholder="https://" type="url" value="https://github.com"/>
</div>
</div>
</div>
<!-- Credentials Card -->
<div class="bg-[#112240] rounded-xl border border-white/10 p-md space-y-md">
<!-- Username Input -->
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Username / Email</label>
<div class="flex items-center bg-[#16274B] rounded-lg border-b-2 border-transparent focus-within:border-primary transition-colors">
<span class="material-symbols-outlined text-on-surface-variant p-3" data-icon="person">person</span>
<input class="w-full bg-transparent border-none text-on-surface font-body-lg text-body-lg focus:ring-0 p-3 pl-0" placeholder="Username" type="text" value="dev_ops_master"/>
<button class="p-3 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="content_copy">content_copy</span>
</button>
</div>
</div>
<!-- Password Input -->
<div class="relative">
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-md text-label-md text-on-surface-variant">Password</label>
<span class="font-label-md text-label-md px-2 py-0.5 rounded bg-primary-fixed/10 text-primary-fixed">Strong</span>
</div>
<div class="flex items-center bg-[#16274B] rounded-lg border-b-2 border-transparent focus-within:border-primary transition-colors">
<span class="material-symbols-outlined text-on-surface-variant p-3" data-icon="key">key</span>
<input class="w-full bg-transparent border-none text-on-surface font-code-display text-code-display focus:ring-0 p-3 pl-0 tracking-widest" placeholder="Password" type="password" value="••••••••••••••••"/>
<div class="flex items-center pr-2 space-x-1">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
<button class="p-2 text-primary hover:text-primary-fixed transition-colors" title="Generate New">
<span class="material-symbols-outlined" data-icon="password">password</span>
</button>
</div>
</div>
</div>
</div>
<!-- Meta & Notes Card -->
<div class="bg-[#112240] rounded-xl border border-white/10 p-md space-y-md">
<!-- Favorite Toggle -->
<div class="flex justify-between items-center py-2 border-b border-white/5">
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant mr-3" data-icon="star">star</span>
<span class="font-body-lg text-body-lg text-on-surface">Favorite</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-surface-container-highest rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<!-- Notes -->
<div class="relative pt-2">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Secure Notes</label>
<div class="bg-[#16274B] rounded-lg border-b-2 border-transparent focus-within:border-primary transition-colors">
<textarea class="w-full bg-transparent border-none text-on-surface font-body-md text-body-md focus:ring-0 p-3 min-h-[100px] resize-y" placeholder="Add any extra details, recovery codes, or hints here..."></textarea>
</div>
</div>
<!-- Add Custom Field -->
<button class="w-full mt-4 py-3 border border-dashed border-outline-variant rounded-lg text-on-surface-variant font-body-md text-body-md hover:bg-surface-bright/20 hover:text-primary transition-all flex items-center justify-center">
<span class="material-symbols-outlined mr-2" data-icon="add_circle">add_circle</span>
                Add Custom Field
            </button>
</div>
<!-- Delete Action -->
<div class="flex justify-center pt-md">
<button class="flex items-center text-error hover:text-error-container transition-colors font-body-md text-body-md py-2 px-4 rounded-lg hover:bg-error/10">
<span class="material-symbols-outlined mr-2" data-icon="delete">delete</span>
                Delete Entry
            </button>
</div>
</main>
<!-- Navigation shell suppressed due to 'Transactional' intent (Edit screen) -->
</body></html>
